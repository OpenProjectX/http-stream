name: Publish Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        shell: bash
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::8}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=ghcr.io/openprojectx/http-stream" >> "$GITHUB_ENV"

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          labels: |
            org.opencontainers.image.source=https://github.com/OpenProjectX/http-stream
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=http-stream
            org.opencontainers.image.description=HTTP streaming pipeline service
